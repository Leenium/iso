name: Nightly ISO Build

on:
  schedule:
    - cron: '1 0 * * *'
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build ISO
      working-directory: iso
      run: make build NO_BOOT_OFFER=1

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: leenium-iso-${{ github.run_number }}
        path: iso/release/*.iso
        if-no-files-found: error
        retention-days: 30
